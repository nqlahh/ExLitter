<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${group.name} + ' — Expenses'">Expenses</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

  <!-- ── Tab bar ───────────────────────────────────────── -->
  <div class="tab-bar">
    <a class="tab inactive" th:href="@{/groups}">Groups</a>
    <a class="tab active"   th:href="@{/groups/{id}/expenses(id=${group.id})}">Expenses</a>
    <a class="tab inactive" th:href="@{/groups/{id}/settle(id=${group.id})}">Settle Up</a>
  </div>

  <!-- ── Page content ──────────────────────────────────── -->
  <div class="page">

    <!-- Navbar -->
    <div class="navbar">
      <div>
        <div class="nav-title" th:text="${group.name}">Group's Name</div>
        <div class="nav-sub" th:text="${#lists.size(group.members)} + ' members'">0 members</div>
      </div>
      <button class="nav-action-btn"
              onclick="document.getElementById('add-expense-form').style.display='block'">
        +ADD EXPENSES
      </button>
    </div>

    <!-- Metric grid -->
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Total Spent</div>
        <div class="metric-val" th:text="'RM ' + ${#numbers.formatDecimal(total,1,2)}">RM 0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Expenses</div>
        <div class="metric-val" th:text="${#lists.size(expenses)}">0</div>
      </div>
    </div>

    <!-- Add expense form -->
    <div id="add-expense-form" class="form-card" style="display:none">
      <div class="section-label">Log an Expense</div>
      <form th:action="@{/groups/{id}/expenses(id=${group.id})}" method="post">
        <label for="description">Expense Name</label>
        <input type="text" id="description" name="description"
               placeholder="e.g. Dinner at Jimbaran" required>

        <div class="form-row">
          <div>
            <label for="totalAmount">Amount (RM)</label>
            <input type="number" id="totalAmount" name="totalAmount"
                   placeholder="0.00" step="0.01" min="0.01" required>
          </div>
          <div>
            <label for="paidByMemberId">Paid By</label>
            <select id="paidByMemberId" name="paidByMemberId" required>
              <option th:each="member : ${members}"
                      th:value="${member.id}"
                      th:text="${member.name}">Member</option>
            </select>
          </div>
        </div>

        <label>Split Among </label>
        <div class="checkbox-list">
          <label th:each="member : ${members}">
            <input type="checkbox" name="participantIds" th:value="${member.id}">
            <span th:text="${member.name}">Member</span>
          </label>
        </div>

        <div class="btn-row">
          <button type="submit" class="submit-btn">Add Expense</button>
          <button type="button" class="cancel-btn"
                  onclick="document.getElementById('add-expense-form').style.display='none'">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Expense list card -->
    <div class="content-card">

      <div th:if="${#lists.isEmpty(expenses)}" class="empty">
        No expenses yet. Hit <strong>+ADD EXPENSES</strong> to log one!
      </div>

      <div class="expense-row" th:each="expense : ${expenses}">
        <div class="exp-avatar"
             th:text="${#strings.substring(expense.paidBy.name,0,2).toUpperCase()}">XX</div>

        <div style="flex:1">
          <div class="exp-name" th:text="${expense.description}">Expense Name</div>
          <div class="exp-meta">
            Paid by <span th:text="${expense.paidBy.name}">Member</span> |
            split:
            <span th:each="p,iter : ${expense.participants}">
              <span th:text="${p.name}">m</span><span th:if="${!iter.last}">, </span>
            </span>
          </div>
        </div>

        <div class="exp-amounts">
          <div class="exp-total"
               th:text="'RM ' + ${#numbers.formatDecimal(expense.totalAmount,1,2)}">RM 0</div>
          <div class="exp-share-good"
               th:text="'Your share : RM ' + ${#numbers.formatDecimal(expense.sharePerParticipant(),1,2)}">
            RM 0
          </div>
          <form th:action="@{/groups/{gid}/expenses/{eid}/delete(gid=${group.id},eid=${expense.id})}"
                method="post" style="margin-top:4px">
            <button type="submit" class="delete-btn">
              <i class="ti ti-trash"></i>
            </button>
          </form>
        </div>
      </div>

    </div>

  </div><!-- /page -->
</body>
</html>
