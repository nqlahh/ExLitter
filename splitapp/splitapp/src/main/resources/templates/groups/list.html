<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExLitter — My Groups</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

  <!-- ── Hero section ──────────────────────────────────── -->
  <div class="hero">
    <div class="hero-logo">Ex<span>Litter</span></div>
    <div class="hero-sub">
      Split all your expenses more easy by using us!<br>
      Free from your troublesome EXpenses.
    </div>
  </div>

  <!-- ── Tab bar ───────────────────────────────────────── -->
  <div class="tab-bar">
    <a class="tab active"   th:href="@{/groups}">Groups</a>
    <a class="tab inactive" th:href="@{/groups}">Expenses</a>
    <a class="tab inactive" th:href="@{/groups}">Settle Up</a>
  </div>

  <!-- ── Page content ──────────────────────────────────── -->
  <div class="page">

    <!-- Navbar -->
    <div class="navbar">
      <div>
        <div class="nav-title">My Groups</div>
        <div class="nav-sub">Track shared expenses by group</div>
      </div>
      <button class="nav-action-btn"
              onclick="document.getElementById('add-group-form').style.display='block'">
        + NEW GROUP
      </button>
    </div>

    <!-- Add group form -->
    <div id="add-group-form" class="form-card" style="display:none">
      <div class="section-label">New Group</div>
      <form th:action="@{/groups}" method="post">
        <label for="name">Group Name</label>
        <input type="text" id="name" name="name"
               placeholder="e.g. Bali Trip 2025" required>

        <label for="members">Members (comma-separated)</label>
        <input type="text" id="members" name="members"
               placeholder="e.g. Aqilah, Naz, Farah" required>

        <div class="btn-row">
          <button type="submit" class="submit-btn">Create Group</button>
          <button type="button" class="cancel-btn"
                  onclick="document.getElementById('add-group-form').style.display='none'">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Group list -->
    <div th:if="${#lists.isEmpty(groups)}" class="empty">
      No groups yet. Hit <strong>+ NEW GROUP</strong> to get started!
    </div>

    <div class="group-row" th:each="grp : ${groups}"
         style="background:var(--brown-card);border-radius:var(--radius-card);
                padding:14px 16px;margin-bottom:10px">
      <div class="group-avatar">🌐</div>

      <div class="group-info">
        <div class="group-name" th:text="${grp.name}">GROUP NAME</div>
        <div class="group-meta">
          <span th:each="member,iter : ${grp.members}">
            <span th:text="${member.name}">Member</span><span th:if="${!iter.last}">, </span>
          </span>
          &nbsp;|&nbsp;
          <span th:text="${#lists.size(grp.expenses)}">0</span> expenses
        </div>
      </div>

      <a class="see-details-btn"
         th:href="@{/groups/{id}/expenses(id=${grp.id})}">
        SEE DETAILS
      </a>
    </div>

  </div><!-- /page -->
</body>
</html>
